<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FART | 论文阅读</title>
    <style>
        :root { --theme-color: #800000; --bg-color: #fdfdfd; }
        body { font-family: "Times New Roman", Times, serif; background: var(--bg-color); color: #1a1a1a; line-height: 1.7; margin: 0; padding: 0; }
        .container { max-width: 750px; margin: 0 auto; padding: 60px 25px; }
        .back-link { text-decoration: none; color: var(--theme-color); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        header { text-align: center; margin-bottom: 60px; margin-top: 30px; }
        h1 { font-size: 2.4rem; margin-bottom: 10px; line-height: 1.2; }
        .meta { font-style: italic; color: #666; margin-bottom: 30px; }
        .abstract { border: 1px solid var(--theme-color); padding: 25px; margin-bottom: 50px; text-align: justify; font-size: 0.95rem; background: #fff; }
        .content { font-size: 1.15rem; text-align: justify; white-space: pre-wrap; }
        footer { border-top: 1px solid #ddd; margin-top: 100px; padding-top: 20px; text-align: center; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回首页 Back to Archive</a>
        <header>
            <h1>这里是论文的标题</h1>
            <div class="meta">作者：[作者名] / 发布日期：2024.10.27 / 分类：#艺术理论</div>
        </header>
        <div class="abstract">
            <strong>ABSTRACT:</strong> 这里填写这篇论文的摘要内容。简明扼要地介绍文章的核心观点。
        </div>
        <div class="content">
            这里是论文的正文内容。
            你可以直接分段粘贴进来。
        </div>
        <footer>
            <p>© FART Project | Fine Art Review and Theory</p>
        </div>
    </div>
</body>
</html>
