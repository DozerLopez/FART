<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FART | 搜索结果</title>
    <script src="registry.js"></script>
    <style>
        :root { --theme-color: #800000; }
        body { font-family: "Times New Roman", Times, serif; background: #fdfdfd; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color); padding-bottom: 10px; text-transform: uppercase; }
        .result-item { margin: 30px 0; border-bottom: 1px dashed #ccc; padding-bottom: 15px; }
        .result-item a { text-decoration: none; color: #000; font-size: 1.4rem; font-weight: bold; }
        .result-meta { color: var(--theme-color); font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .highlight { background: yellow; } /* 关键词高亮（可选） */
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="text-decoration:none; color:#666;">← Back to Archive</a>
        <h1 id="search-title">Search Results</h1>
        <div id="results-list">正在搜索...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('query').toLowerCase();
        document.getElementById('search-title').innerText = `Results for: "${query}"`;

        // 在 registry.js 的数据中进行模糊搜索
        const results = PAPERS_DATA.filter(p => {
            return p.title.toLowerCase().includes(query) || 
                   p.author.toLowerCase().includes(query) || 
                   p.tag.toLowerCase().includes(query) ||
                   (p.abstract && p.abstract.toLowerCase().includes(query));
        });

        const listDiv = document.getElementById('results-list');
        if (results.length === 0) {
            listDiv.innerHTML = "<p>未找到相关文章。建议尝试其他关键词。</p>";
        } else {
            listDiv.innerHTML = ""; // 清空加载提示
            results.forEach(p => {
                listDiv.innerHTML += `
                    <div class="result-item">
                        <div class="result-meta">${p.date} / ${p.author} / #${p.tag}</div>
                        <a href="${p.url}">${p.title}</a>
                        <p style="font-size:0.9rem; color:#555; margin-top:10px;">${p.abstract || ''}</p>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
